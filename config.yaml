# ============================================================
#  Hardware & inference configuration
#  Edit this file before running benchmarks on your machine.
#  Run `lscpu` and `numactl --hardware` to verify your values.
# ============================================================

# ── NUMA binding ─────────────────────────────────────────────
# "0,1" = both sockets (recommended for full-system runs)
# "0"   = single socket only
numa:
  cpunodebind: "0,1"
  membind: "0,1"

# ── PyTorch thread settings ──────────────────────────────────
# Set omp_num_threads = physical core count (no HT)
# e.g. 2 sockets × 32 cores = 64 for Xeon 6737P
pytorch:
  omp_num_threads: 64
  kmp_blocktime: 1
  kmp_affinity: "granularity=fine,compact,1,0"

# ── OpenVINO settings ─────────────────────────────────────────
# inference_precision:
#   "bf16"  → use AMX-BF16 tiles (Sapphire Rapids / Granite Rapids only)
#   "f32"   → fallback for older CPUs (Cascade Lake, Ice Lake)
#   "f16"   → FP16 on supported platforms
openvino:
  inference_precision: "bf16"
  performance_hint: "THROUGHPUT"
  num_streams: 0    # 0 = let OpenVINO decide
  num_threads: 0    # 0 = let OpenVINO decide

# ── Benchmark parameters ─────────────────────────────────────
bench:
  batch_sizes: [64, 128, 256, 512]
  worker_counts: [1, 2, 4, 8]
  warmup_batches: 5
  bench_seconds: 30

# ── Variants to run ──────────────────────────────────────────
# Comment out any line to skip that variant.
variants:
  - [pytorch, fp32]
  - [pytorch, fp16]
  - [pytorch, bf16]
  - [openvino, bf16]
  - [openvino, int8]
  - [openvino, int4]

# ── Server / worker plans ────────────────────────────────────
# Used by scenario_bench.py and load_test.py.
# Each entry: numa node + list of logical CPU IDs for that worker.
# Reference topology: 2× Xeon 6737P
#   Node 0: physical 0-31, HT siblings 64-95
#   Node 1: physical 32-63, HT siblings 96-127
#
# To scale down (e.g. 1 socket / 16 cores): keep only node-0 entries
# and shorten each core list accordingly.

server_plans:
  # 8 workers — physical cores only, no HT
  phys:
    - {node: 0, cores: [0,1,2,3,4,5,6,7]}
    - {node: 0, cores: [8,9,10,11,12,13,14,15]}
    - {node: 0, cores: [16,17,18,19,20,21,22,23]}
    - {node: 0, cores: [24,25,26,27,28,29,30,31]}
    - {node: 1, cores: [32,33,34,35,36,37,38,39]}
    - {node: 1, cores: [40,41,42,43,44,45,46,47]}
    - {node: 1, cores: [48,49,50,51,52,53,54,55]}
    - {node: 1, cores: [56,57,58,59,60,61,62,63]}

  # 16 workers — 4 physical + 4 HT each
  ht_16:
    - {node: 0, cores: [0,1,2,3,64,65,66,67]}
    - {node: 0, cores: [4,5,6,7,68,69,70,71]}
    - {node: 0, cores: [8,9,10,11,72,73,74,75]}
    - {node: 0, cores: [12,13,14,15,76,77,78,79]}
    - {node: 0, cores: [16,17,18,19,80,81,82,83]}
    - {node: 0, cores: [20,21,22,23,84,85,86,87]}
    - {node: 0, cores: [24,25,26,27,88,89,90,91]}
    - {node: 0, cores: [28,29,30,31,92,93,94,95]}
    - {node: 1, cores: [32,33,34,35,96,97,98,99]}
    - {node: 1, cores: [36,37,38,39,100,101,102,103]}
    - {node: 1, cores: [40,41,42,43,104,105,106,107]}
    - {node: 1, cores: [44,45,46,47,108,109,110,111]}
    - {node: 1, cores: [48,49,50,51,112,113,114,115]}
    - {node: 1, cores: [52,53,54,55,116,117,118,119]}
    - {node: 1, cores: [56,57,58,59,120,121,122,123]}
    - {node: 1, cores: [60,61,62,63,124,125,126,127]}

  # 32 workers — 2 physical + 2 HT each (optimal for OV-INT8)
  ht_32:
    - {node: 0, cores: [0,1,64,65]}     - {node: 0, cores: [2,3,66,67]}
    - {node: 0, cores: [4,5,68,69]}     - {node: 0, cores: [6,7,70,71]}
    - {node: 0, cores: [8,9,72,73]}     - {node: 0, cores: [10,11,74,75]}
    - {node: 0, cores: [12,13,76,77]}   - {node: 0, cores: [14,15,78,79]}
    - {node: 0, cores: [16,17,80,81]}   - {node: 0, cores: [18,19,82,83]}
    - {node: 0, cores: [20,21,84,85]}   - {node: 0, cores: [22,23,86,87]}
    - {node: 0, cores: [24,25,88,89]}   - {node: 0, cores: [26,27,90,91]}
    - {node: 0, cores: [28,29,92,93]}   - {node: 0, cores: [30,31,94,95]}
    - {node: 1, cores: [32,33,96,97]}   - {node: 1, cores: [34,35,98,99]}
    - {node: 1, cores: [36,37,100,101]} - {node: 1, cores: [38,39,102,103]}
    - {node: 1, cores: [40,41,104,105]} - {node: 1, cores: [42,43,106,107]}
    - {node: 1, cores: [44,45,108,109]} - {node: 1, cores: [46,47,110,111]}
    - {node: 1, cores: [48,49,112,113]} - {node: 1, cores: [50,51,114,115]}
    - {node: 1, cores: [52,53,116,117]} - {node: 1, cores: [54,55,118,119]}
    - {node: 1, cores: [56,57,120,121]} - {node: 1, cores: [58,59,122,123]}
    - {node: 1, cores: [60,61,124,125]} - {node: 1, cores: [62,63,126,127]}
